version: '3.3'

services:
  # NATS Messaging
  nats:
    image: nats:2.14-alpine3.22
    container_name: WhoWillAnswer_nats_standalone
    env_file:
      - .env.${ENV:-development}
    ports:
      - "4222:4222"
      - "8222:8222"
    restart: unless-stopped
    volumes:
      - ./nats.conf:/etc/nats/nats.conf:ro
      - nats-data:/data
    command: ["-c", "/etc/nats/nats.conf"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  nats-data: