version: '3.3'

services:
  # FastAPI Backend
  backend:
    build:
     context: .
     dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    env_file:
      - .env.${ENV:-development}
    environment:
      - ENV=${ENV:-development}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    #   nats:
    #     condition: service_healthy
    volumes:
      - .:/app
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health/" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 40s